version: '3.9'
services:
  backend:
    build:
      context: ./backend
    ports:
      - "2244:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - finantz-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    networks:
      - finantz-network

networks:
  finantz-network:
    driver: bridge
